<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel Administrativo — Sistema de Gestão de Equipamentos">
    <title>Admin — Gestão de Equipamentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons — Flaticon UIcons -->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
</head>
<body>
    <!-- ═══ HEADER ═══ -->
    <header class="app-header">
        <div class="app-header__brand">
            <h1 class="app-header__title"><i class="fi fi-rr-key"></i> Painel Administrativo</h1>
            <span class="app-header__subtitle">Gerenciamento do Sistema</span>
        </div>
        <div class="app-header__right">
            <a href="index.html" class="btn btn--sm btn--secondary">← Dashboard</a>
            <button class="btn btn--sm btn--secondary" id="logoutBtn" type="button">Sair</button>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Alternar tema">
                <span class="theme-toggle__icon theme-toggle__icon--sun"><i class="fi fi-rr-sun"></i></span>
                <span class="theme-toggle__icon theme-toggle__icon--moon"><i class="fi fi-rr-moon"></i></span>
                <span class="theme-toggle__slider"></span>
            </button>
        </div>
    </header>

    <!-- ═══ MAIN ═══ -->
    <main class="main-content">
        <!-- Admin Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="users" type="button"><i class="fi fi-rr-users"></i> Usuários</button>
            <button class="admin-tab" data-tab="equipment" type="button"><i class="fi fi-rr-music-alt"></i> Equipamentos</button>
        </div>

        <!-- ── Users Panel ── -->
        <section id="usersPanel" class="admin-panel">
            <div class="admin-panel__header">
                <h2>Usuários Cadastrados</h2>
                <span class="admin-panel__count" id="usersCount">0 usuários</span>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Nome</th>
                            <th>Cargo</th>
                            <th>Criado em</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </section>

        <!-- ── Equipment Panel ── -->
        <section id="equipmentPanel" class="admin-panel" style="display:none">
            <div class="admin-panel__header">
                <h2>Todos os Equipamentos</h2>
                <span class="admin-panel__count" id="equipmentCount">0 itens</span>
            </div>
            <div class="equipment-grid" id="adminEquipmentGrid"></div>
            <div class="empty-state" id="adminEmptyState">
                <div class="empty-state__icon"><i class="fi fi-rr-box"></i></div>
                <h3 class="empty-state__title">Nenhum equipamento cadastrado</h3>
                <p class="empty-state__text">Os equipamentos adicionados pelos usuários aparecerão aqui.</p>
            </div>
        </section>
    </main>

    <!-- ═══ PASSWORD MODAL ═══ -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="pwModalTitle">
            <div class="modal__header">
                <h2 class="modal__title" id="pwModalTitle">Alterar Senha</h2>
                <button class="modal__close" id="pwModalClose" type="button" aria-label="Fechar">&times;</button>
            </div>
            <form class="modal__body" id="passwordForm" novalidate>
                <input type="hidden" id="pwUserId">
                <p id="pwUserInfo" class="form-info-text"></p>
                <div class="form-group">
                    <label class="form-group__label" for="newPassword">Nova Senha <span class="required">*</span></label>
                    <input type="password" class="form-group__input" id="newPassword" required minlength="4"
                           placeholder="Mínimo 4 caracteres">
                </div>
                <div class="form-group">
                    <label class="form-group__label" for="confirmNewPassword">Confirmar Nova Senha <span class="required">*</span></label>
                    <input type="password" class="form-group__input" id="confirmNewPassword" required minlength="4"
                           placeholder="Repita a nova senha">
                </div>
            </form>
            <div class="modal__footer">
                <button type="button" class="btn btn--secondary" id="pwModalCancel">Cancelar</button>
                <button type="submit" class="btn btn--primary" form="passwordForm">Alterar Senha</button>
            </div>
        </div>
    </div>

    <!-- ═══ NOTIFICATION ═══ -->
    <div class="notification" id="notification" role="alert" aria-live="polite"></div>

    <script type="module" src="js/admin-app.js"></script>
</body>
</html>
